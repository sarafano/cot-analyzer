<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Sniper COT: EUR</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        canvas { background-color: #1e1e1e; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Força Institucional (EUR)</h1>
        <p>Dados do Smart Money (Non-Commercials)</p>
        <canvas id="cotChart" width="400" height="300"></canvas>
    </div>

    <script>
        // Lemos os dados gerados pelo GitHub Actions
        fetch('euro_cot.json')
            .then(response => response.json())
            .then(data => {
                const labels = data.map(item => item.date);
                const positions = data.map(item => item.net_position);

                const ctx = document.getElementById('cotChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Posição Líquida (Net)',
                            data: positions,
                            borderColor: positions[positions.length - 1] < 0 ? '#ff4d4d' : '#4dff4d',
                            tension: 0.1,
                            fill: false
                        }]
                    },
                    options: {
                        scales: {
                            y: { grid: { color: '#333' }, ticks: { color: 'white' } },
                            x: { grid: { color: '#333' }, ticks: { color: 'white' } }
                        },
                        plugins: { legend: { labels: { color: 'white' } } }
                    }
                });
            });
    </script>
</body>
</html>
