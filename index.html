<!DOCTYPE html>
<html>
<head>
    <title>Sniper COT - EUR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; padding: 15px; }
        .box { border: 1px solid #00ff00; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
        h2 { text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>EUR Institutional Sentiment</h2>
        <canvas id="chart"></canvas>
    </div>
    <script>
        fetch('euro_data.json')
            .then(r => r.json())
            .then(data => {
                const ctx = document.getElementById('chart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.date),
                        datasets: [{
                            label: 'Net Position',
                            data: data.map(d => d.net),
                            borderColor: '#00ff00',
                            backgroundColor: 'rgba(0, 255, 0, 0.1)',
                            fill: true
                        }]
                    }
                });
            });
    </script>
</body>
</html>
