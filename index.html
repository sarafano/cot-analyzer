<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COT Sentiment</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 10px; }
.chart-container { width: 100%; max-width: 800px; margin: auto; background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; }
</style>
</head>
<body>
<h1>INSTITUTIONAL SENTIMENT</h1>
<div class="chart-container"><canvas id="cotChart"></canvas></div>
<script>
const csvURL = "https://docs.google.com/spreadsheets/d/1OQoOsv37W-A9oU4OSajwPm-Wnu511rYKcDPchGLhxnM/gviz/tq?tqx=out:csv";
async function loadChart() {
try {
const response = await fetch(csvURL);
const text = await response.text();
const rows = text.split('\n').map(line => {
const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
return matches ? matches.map(m => m.replace(/"/g, '')) : [];
});
const validRows = rows.filter(r => r.length > 5 && r[0] !== "" && !isNaN(parseFloat(r[1].replace(/,/g, ''))));
const last15 = validRows.slice(-15);
const labels = last15.map(d => d[0]);
const eurData = last15.map(d => parseFloat(d[1].replace(/,/g, '')) || 0);
const gbpData = last15.map(d => parseFloat(d[4].replace(/,/g, '')) || 0);
new Chart(document.getElementById('cotChart'), {
type: 'line',
data: {
labels: labels,
datasets: [
{ label: 'EUR Net', data: eurData, borderColor: '#0f0', backgroundColor: 'rgba(0,255,0,0.1)', fill: true, tension: 0.3 },
{ label: 'GBP Net', data: gbpData, borderColor: '#0cf', fill: false, tension: 0.3 }
]
},
options: {
responsive: true,
scales: {
y: { grid: { color: '#222' }, ticks: { color: '#888' } },
x: { grid: { display: false }, ticks: { color: '#888' } }
},
plugins: { legend: { labels: { color: '#fff' } } }
}
});
} catch (e) { console.error(e); }
}
loadChart();
</script>
</body>
</html>
