<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COT Sentiment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 10px; }
        .chart-container { width: 100%; max-width: 800px; margin: auto; background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>INSTITUTIONAL SENTIMENT</h1>
    <div class="chart-container"><canvas id="cotChart"></canvas></div>

    <script>
        const csvURL = "https://docs.google.com/spreadsheets/d/1OQoOsv37W-A9oU4OSajwPm-Wnu511rYKcDPchGLhxnM/gviz/tq?tqx=out:csv";

        async function loadChart() {
            const response = await fetch(csvURL);
            const text = await response.text();
            const rows = text.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '')));

            // Encontrar em que coluna está cada ativo (Dinâmico)
            const header = rows[0];
            const colData = 0; // Coluna A
            const colEur = header.findIndex(h => h.includes("EUR"));
            const colGbp = header.findIndex(h => h.includes("GBP"));

            // Filtrar apenas linhas que têm data e números
            const dataRows = rows.filter(r => r[colData] && !isNaN(parseInt(r[colEur])));
            const last15 = dataRows.slice(-15);

            new Chart(document.getElementById('cotChart'), {
                type: 'line',
                data: {
                    labels: last15.map(d => d[colData]),
                    datasets: [
                        { label: 'EUR Net', data: last15.map(d => parseInt(d[colEur])), borderColor: '#0f0', tension: 0.3 },
                        { label: 'GBP Net', data: last15.map(d => parseInt(d[colGbp])), borderColor: '#0cf', tension: 0.3 }
                    ]
                },
                options: { scales: { y: { grid: { color: '#222' } }, x: { grid: { display: false } } } }
            });
        }
        loadChart();
    </script>
</body>
</html>
