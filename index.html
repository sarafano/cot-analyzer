<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>body{background:#000;color:#0f0;font-family:sans-serif;}</style>
</head>
<body>
    <canvas id="chart"></canvas>
    <script>
        const url = "https://docs.google.com/spreadsheets/d/1OQoOsv37W-A9oU4OSajwPm-Wnu511rYKcDPchGLhxnM/gviz/tq?tqx=out:csv";
        fetch(url).then(r => r.text()).then(txt => {
            const rows = txt.split('\n').map(r => r.split(','));
            // SÓ PEGA LINHAS QUE TÊM NÚMEROS REAIS (Ignora os #REF! e #ERROR!)
            const data = rows.filter(r => r[1] && !isNaN(parseFloat(r[1].replace(/"/g,'')))).slice(-10);
            
            new Chart(document.getElementById('chart'), {
                type: 'line',
                data: {
                    labels: data.map(d => d[0].replace(/"/g,'')),
                    datasets: [{ label:'EUR', data: data.map(d => parseFloat(d[1].replace(/"/g,''))), borderColor:'#0f0' }]
                }
            });
        });
    </script>
</body>
</html>
