<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COT Sentiment</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding: 10px; }
.chart-container { width: 100%; max-width: 800px; margin: auto; background: #111; padding: 10px; border-radius: 10px; border: 1px solid #333; }
</style>
</head>
<body>
<h1>INSTITUTIONAL SENTIMENT</h1>
<div class="chart-container"><canvas id="cotChart"></canvas></div>
<script>
const csvURL = "https://docs.google.com/spreadsheets/d/1OQoOsv37W-A9oU4OSajwPm-Wnu511rYKcDPchGLhxnM/gviz/tq?tqx=out:csv";

function cleanNum(txt) {
    if (!txt) return 0;
    // Remove tudo o que não é número ou sinal de menos
    let n = txt.replace(/"/g, '').replace(/[^\d.-]/g, '');
    return parseFloat(n) || 0;
}

async function loadChart() {
    try {
        const response = await fetch(csvURL);
        const text = await response.text();
        const rows = text.split('\n').map(line => line.split(','));
        
        // Filtra linhas que tenham algo na coluna da Data (A) e no EUR (B)
        const validRows = rows.filter(r => r.length > 5 && r[0].length > 2);
        const last15 = validRows.slice(-15);

        new Chart(document.getElementById('cotChart'), {
            type: 'line',
            data: {
                labels: last15.map(d => d[0].replace(/"/g, '')),
                datasets: [
                    { label: 'EUR Net', data: last15.map(d => cleanNum(d[1])), borderColor: '#0f0', tension: 0.3, fill: false },
                    { label: 'GBP Net', data: last15.map(d => cleanNum(d[4])), borderColor: '#0cf', tension: 0.3, fill: false }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: { grid: { color: '#222' }, ticks: { color: '#888' } },
                    x: { grid: { display: false }, ticks: { color: '#888' } }
                },
                plugins: { legend: { labels: { color: '#fff' } } }
            }
        });
    } catch (e) { console.error(e); }
}
loadChart();
</script>
</body>
</html>
