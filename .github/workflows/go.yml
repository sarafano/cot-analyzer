name: COT Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 5' # Corre automaticamente todas as sextas às 22:00

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permissão crucial para o robô poder gravar dados
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Baixa todo o histórico para evitar erros de sincronização

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run script
        run: python cot_update.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Sincroniza com as tuas mudanças manuais (o [] que puseste)
          git pull origin main --rebase
          
          # Adiciona os novos dados reais
          git add euro_data.json
          
          # Grava e envia, ignorando se não houver mudanças
          git commit -m "Update COT data with real March 2026 values" || exit 0
          git push origin main
