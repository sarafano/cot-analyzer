name: COT-Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 5'

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Dependencies
        run: pip install pandas cot-reports
      - name: Run
        run: python cot_update.py
      - name: Save
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "update" || exit 0
          git push
