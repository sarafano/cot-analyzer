name: Update COT Data
on:
  schedule:
    - cron: '0 21 * * 5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas cot-reports
      - name: Run script
        run: python cot_update.py
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add euro_data.json
          git commit -m "Update COT" || exit 0
          git push
